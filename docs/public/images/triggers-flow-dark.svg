  <path d="M0 30.9455V42.5817L29.091 64.4V26.5817L20.9455 20.4727C12.3125 14 0 20.16 0 30.945V30.9455Z" fill="#C5221F"/>
</g>
<text x="79" y="236" text-anchor="start" dy="0.35em" font-size="13" font-weight="500" fill="var(--text)">Gmail</text>

<!-- Accent nodes (Webhook Receiver, Poller, Webhook Subscription) -->
<rect x="330" y="128" width="150" height="36" rx="6" fill="var(--accent-surface)" stroke="var(--accent-border)" stroke-width="0.75" filter="url(#sh-sm)" />
<rect x="365" y="218" width="80" height="36" rx="6" fill="var(--accent-surface)" stroke="var(--accent-border)" stroke-width="0.75" filter="url(#sh-sm)" />
<rect x="655" y="173" width="150" height="36" rx="6" fill="var(--accent-surface)" stroke="var(--accent-border)" stroke-width="0.75" filter="url(#sh-sm)" />

<!-- ── Composio + App node labels ── -->
<text x="405" y="146" text-anchor="middle" dy="0.35em" font-size="12.5" font-weight="600" fill="var(--text)">Webhook Receiver</text>
<text x="405" y="236" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--text)">Poller</text>
<text x="730" y="191" text-anchor="middle" dy="0.35em" font-size="12.5" font-weight="600" fill="var(--text)">Webhook Subscription</text>
</svg>
